<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Classic Game Education</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin:0;
    padding:0;
    background-color: #6a0dad; /* Roxo */
    color: #fff;
}

h1{
    margin-top: 30px;
    text-shadow: 2px 2px 4px #000;
}

#menu, #room, #quiz{
    background: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 15px;
    display:inline-block;
    margin-top: 30px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.7);
}

button{
    padding:10px 20px;
    margin:5px;
    font-size:16px;
    border-radius: 12px;
    border: 2px solid #ccc;
    cursor:pointer;
    transition: all 0.2s;
    background: #222;
    color: #fff;
}

button:hover{
    background: #555;
    border-color: #fff;
}

input{
    padding:10px;
    font-size:16px;
    border-radius: 10px;
    border: 2px solid #ccc;
    margin:5px 0;
}

.resposta{
    display:block;
    width:200px;
    margin:10px auto;
}

#codeCard{
    background: #fff;
    color: #000;
    padding: 10px;
    border-radius: 10px;
    font-weight: bold;
    font-size: 20px;
    display: inline-block;
    margin: 10px 0;
}

.section{
    margin-bottom: 30px;
}
</style>
</head>

<body>

<h1>Classic Game Education</h1>

<div id="menu">

<div class="section">
<h2>Criar sala</h2>
<input id="teamName" placeholder="Nome da equipe">
<br><br>
<button onclick="createRoom()">Criar sala</button>
</div>

<div class="section">
<h2>Entrar em sala</h2>
<input id="roomCode" placeholder="Código da sala">
<br>
<input id="teamNameJoin" placeholder="Nome da equipe">
<br><br>
<button onclick="joinRoom()">Entrar</button>
</div>

</div>

<div id="room" style="display:none">

<h2>Sala</h2>
<div id="codeCard">Código: <span id="code"></span></div>

<h3>Equipes:</h3>
<ul id="teams"></ul>

<button id="startBtn" onclick="startGame()" style="display:none">
Iniciar jogo
</button>

</div>

<div id="quiz" style="display:none">

<h2 id="pergunta"></h2>

<button class="resposta" id="r0" onclick="responder(0)"></button>
<button class="resposta" id="r1" onclick="responder(1)"></button>
<button class="resposta" id="r2" onclick="responder(2)"></button>
<button class="resposta" id="r3" onclick="responder(3)"></button>

</div>

<!-- Sons -->
<audio id="musicaFundo" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>
<audio id="acerto">
  <source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" type="audio/ogg">
</audio>
<audio id="erro">
  <source src="https://actions.google.com/sounds/v1/cartoon/boing.ogg" type="audio/ogg">
</audio>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBctuZsRtJYFhjsqsu3gBJKgE9QaQI-Dy0",
  authDomain: "app-neri-e-enzo.firebaseapp.com",
  databaseURL: "https://app-neri-e-enzo-default-rtdb.firebaseio.com",
  projectId: "app-neri-e-enzo",
  storageBucket: "app-neri-e-enzo.firebasestorage.app",
  messagingSenderId: "109815945254",
  appId: "1:109815945254:web:16adb8f04b33bda4e36ee7"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let roomCode = "";
let leader = false;

function generateCode(){
    return Math.random().toString(36).substring(2,7).toUpperCase();
}

function createRoom(){
    let team = document.getElementById("teamName").value;
    if(team==""){ alert("Digite o nome da equipe"); return; }
    roomCode = generateCode();
    leader = true;
    db.ref("rooms/"+roomCode).set({started:false});
    db.ref("rooms/"+roomCode+"/teams/"+team).set({score:0});
    enterRoom();
}

function joinRoom(){
    let code = document.getElementById("roomCode").value.toUpperCase();
    let team = document.getElementById("teamNameJoin").value;
    if(code=="" || team==""){ alert("Preencha tudo"); return; }
    roomCode = code;
    db.ref("rooms/"+roomCode+"/teams/"+team).set({score:0});
    enterRoom();
}

function enterRoom(){
    document.getElementById("menu").style.display="none";
    document.getElementById("room").style.display="block";
    document.getElementById("code").innerText = roomCode;

    db.ref("rooms/"+roomCode+"/teams").on("value", snapshot=>{
        let list = document.getElementById("teams");
        list.innerHTML="";
        snapshot.forEach(child=>{
            let li = document.createElement("li");
            li.innerText = child.key;
            list.appendChild(li);
        });
    });

    if(leader){ document.getElementById("startBtn").style.display="block"; }
}

function startGame(){
    db.ref("rooms/"+roomCode+"/started").set(true);
    document.getElementById("room").style.display="none";
    document.getElementById("quiz").style.display="block";
    document.getElementById("musicaFundo").volume = 0.2;
    document.getElementById("musicaFundo").play();
    prepararPerguntas();
    mostrarPergunta();
}

// --- QUIZ ALEATÓRIO ---
let todasPerguntas = [
    {p:"5 + 5 = ?",r:["8","9","10","11"],c:2},
    {p:"7 x 3 = ?",r:["21","20","24","18"],c:0},
    {p:"12 - 4 = ?",r:["6","7","8","9"],c:2},
    {p:"9 + 6 = ?",r:["13","14","15","16"],c:2},
    {p:"3 x 4 = ?",r:["10","11","12","13"],c:2},
    {p:"15 - 5 = ?",r:["10","9","11","12"],c:0},
    {p:"8 + 2 = ?",r:["10","11","12","9"],c:0},
    {p:"6 x 2 = ?",r:["10","11","12","13"],c:2},
    {p:"20 - 10 = ?",r:["5","10","15","20"],c:1},
    {p:"4 x 5 = ?",r:["20","18","22","25"],c:0},
    // adicione mais perguntas
];

let perguntas = [];
let perguntaAtual = 0;
let pontos = 0;

function prepararPerguntas(){
    perguntas = [];
    let copia = [...todasPerguntas];
    for(let i=0;i<10;i++){
        let idx = Math.floor(Math.random()*copia.length);
        let q = copia.splice(idx,1)[0];
        // embaralhar respostas
        let respostas = [...q.r];
        let respostaCorreta = q.r[q.c];
        for(let j=respostas.length-1;j>0;j--){
            let k = Math.floor(Math.random()* (j+1));
            [respostas[j], respostas[k]] = [respostas[k], respostas[j]];
        }
        q.c = respostas.indexOf(respostaCorreta);
        q.r = respostas;
        perguntas.push(q);
    }
}

function mostrarPergunta(){
    let q = perguntas[perguntaAtual];
    document.getElementById("pergunta").innerText = q.p;
    for(let i=0;i<4;i++){
        let btn = document.getElementById("r"+i);
        btn.innerText = q.r[i];
        btn.style.background="";
    }
}

function responder(num){
    let q = perguntas[perguntaAtual];
    let btn = document.getElementById("r"+num);
    if(num==q.c){
        btn.style.background="green";
        document.getElementById("acerto").play();
        pontos++;
    }else{
        btn.style.background="red";
        document.getElementById("erro").play();
    }
    setTimeout(()=>{
        perguntaAtual++;
        if(perguntaAtual<perguntas.length){
            mostrarPergunta();
        }else{
            alert("Quiz terminado! Pontos: "+pontos);
        }
    },800);
}

// --- BOTÃO DESENVOLVEDORES ---
let devDiv = document.createElement("div");
devDiv.style.marginTop = "30px";
let devBtn = document.createElement("button");
devBtn.innerText = "Desenvolvedores";
devBtn.style.opacity = "0.5";
devBtn.style.fontSize = "12px";
devBtn.style.padding = "5px 10px";
devBtn.addEventListener("click", function(){
    alert("Olá, somos os Desenvolvedores da Clássica Game Education, basicamente é um jogo escolar, ou seja, um quiz onde vocês conseguem acessar equipes. Apenas crie sua sala, informe o código e se divirtam! \n\nEsse é um quiz de matemática, mas em outras atualizações adicionaremos outras matérias.\n\nAss: Neri e Enzo Santos");
});
document.body.appendChild(devDiv);
devDiv.appendChild(devBtn);

</script>

</body>
</html>
