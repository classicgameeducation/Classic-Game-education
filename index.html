<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Classic Game Education</title>
    <meta name="description" content="Participe do Classic Game Education — responda perguntas em um quiz interativo, compita com outras equipes e aprenda de forma divertida!">

    <meta property="og:title" content="Classic Game Education">
    <meta property="og:description" content="O quiz multiplayer onde você aprende jogando!">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://classicgameeducation.github.io/Classic-Game-education/">
    
    <meta property="og:image" content="https://classicgameeducation.github.io/Classic-Game-education/logo.png">

    <link rel="icon" type="image/png" href="logo.png">

<style>
body{
font-family:Arial,sans-serif;
text-align:center;
margin:0;
padding:0;
background:linear-gradient(135deg,#6a0dad,#4b0082);
color:#fff;
}

h1{
margin-top:30px;
text-shadow:0 0 15px #fff;
animation:tituloGlow 3s infinite alternate;
}

@keyframes tituloGlow{
from{ text-shadow:0 0 10px #fff; }
to{ text-shadow:0 0 30px #fff; }
}

#menu,#room,#quiz,#winnerScreen{
background:rgba(0,0,0,0.6);
padding:20px;
border-radius:15px;
display:inline-block;
margin-top:30px;
box-shadow:0 8px 16px rgba(0,0,0,0.7);
animation:entrada .6s ease;
}

@keyframes entrada{
0%{opacity:0;transform:translateY(30px);}
100%{opacity:1;transform:translateY(0);}
}

button{
padding:10px 20px;
margin:5px;
font-size:16px;
border-radius:12px;
border:2px solid #ccc;
cursor:pointer;
background:#222;
color:#fff;
transition:all .2s;
}

button:hover{
background:#555;
border-color:#fff;
transform:scale(1.1);
box-shadow:0 0 12px #fff;
}

input{
padding:10px;
font-size:16px;
border-radius:10px;
border:2px solid #ccc;
margin:5px 0;
}

.resposta{
display:block;
width:200px;
margin:10px auto;
transition:all .2s;
}

.resposta:hover{
transform:scale(1.1);
box-shadow:0 0 12px #fff;
}

#codeCard{
background:#fff;
color:#000;
padding:10px;
border-radius:10px;
font-weight:bold;
font-size:20px;
display:inline-block;
margin:10px 0;
}

.section{margin-bottom:30px;}

#timer{
font-size:22px;
margin-bottom:10px;
}

#timeBarBox{
width:300px;
height:20px;
background:#333;
margin:10px auto;
border-radius:10px;
overflow:hidden;
}

#timeBar{
height:100%;
width:100%;
background:linear-gradient(90deg,#00ff88,#00ffaa);
transition:width 1s linear;
}

#winnerScreen{
display:none;
}

#winnerName{
font-size:28px;
color:gold;
animation:campeao 2s infinite;
}

@keyframes campeao{
0%{transform:scale(1);text-shadow:0 0 10px gold;}
50%{transform:scale(1.15);text-shadow:0 0 30px gold;}
100%{transform:scale(1);text-shadow:0 0 10px gold;}
}
</style></head><body><h1>Classic Game Education</h1><div id="menu"><div class="section">
<h2>Criar sala</h2>
<input id="teamName" placeholder="Nome da equipe">
<br><br>
<button onclick="createRoom()">Criar sala</button>
</div><div class="section">
<h2>Entrar em sala</h2>
<input id="roomCode" placeholder="Código da sala">
<br>
<input id="teamNameJoin" placeholder="Nome da equipe">
<br><br>
<button onclick="joinRoom()">Entrar</button>
</div></div><div id="room" style="display:none"><h2>Sala</h2>
<div id="codeCard">Código: <span id="code"></span></div><h3>Equipes:</h3>
<ul id="teams"></ul><h3>Ranking ao vivo</h3>
<ul id="ranking"></ul><button id="startBtn" onclick="startGame()" style="display:none">
Iniciar jogo
</button></div><div id="quiz" style="display:none"><h3 id="timer">Tempo: 10</h3><div id="timeBarBox">
<div id="timeBar"></div>
</div><h2 id="pergunta"></h2><button class="resposta" id="r0" onclick="responder(0)"></button>
<button class="resposta" id="r1" onclick="responder(1)"></button>
<button class="resposta" id="r2" onclick="responder(2)"></button>
<button class="resposta" id="r3" onclick="responder(3)"></button>

</div><div id="winnerScreen">
<h1>🏆 CAMPEÃO 🏆</h1>
<h2 id="winnerName"></h2>
<button onclick="location.reload()">Jogar novamente</button>
</div><audio id="musicaFundo" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio><audio id="acerto">
<source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">
</audio><audio id="erro">
<source src="https://actions.google.com/sounds/v1/cartoon/boing.ogg">
</audio><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script><script>

const firebaseConfig={
apiKey:"AIzaSyBctuZsRtJYFhjsqsu3gBJKgE9QaQI-Dy0",
authDomain:"app-neri-e-enzo.firebaseapp.com",
databaseURL:"https://app-neri-e-enzo-default-rtdb.firebaseio.com",
projectId:"app-neri-e-enzo",
storageBucket:"app-neri-e-enzo.firebasestorage.app",
messagingSenderId:"109815945254",
appId:"1:109815945254:web:16adb8f04b33bda4e36ee7"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let roomCode="";
let leader=false;
let teamName="";
let perguntas=[];
let perguntaAtual=0;
let pontos=0;
let tempo=10;
let timer;

function generateCode(){
return Math.random().toString(36).substring(2,7).toUpperCase();
}

function createRoom(){

teamName=document.getElementById("teamName").value;
if(teamName==""){alert("Digite o nome");return;}

roomCode=generateCode();
leader=true;

db.ref("rooms/"+roomCode).set({started:false});
db.ref("rooms/"+roomCode+"/teams/"+teamName).set({score:0});

enterRoom();
}

function joinRoom(){

let code=document.getElementById("roomCode").value.toUpperCase();
teamName=document.getElementById("teamNameJoin").value;

if(code==""||teamName==""){alert("Preencha tudo");return;}

roomCode=code;

db.ref("rooms/"+roomCode+"/teams").once("value",snap=>{

if(snap.numChildren()>=10){
alert("Sala cheia (10 equipes)");
return;
}

db.ref("rooms/"+roomCode+"/teams/"+teamName).set({score:0});
enterRoom();

});
}

function enterRoom(){

document.getElementById("menu").style.display="none";
document.getElementById("room").style.display="block";

document.getElementById("code").innerText=roomCode;

db.ref("rooms/"+roomCode+"/teams").on("value",snapshot=>{

let list=document.getElementById("teams");
list.innerHTML="";

snapshot.forEach(child=>{

let li=document.createElement("li");

if(child.key==teamName && leader)
li.innerText=child.key+" 👑";
else
li.innerText=child.key;

list.appendChild(li);

});

});

atualizarRanking();

if(leader)
document.getElementById("startBtn").style.display="block";

}

function atualizarRanking(){

db.ref("rooms/"+roomCode+"/teams").on("value",snap=>{

let lista=[];

snap.forEach(child=>{
lista.push({
nome:child.key,
score:child.val().score||0
});
});

lista.sort((a,b)=>b.score-a.score);

let rank=document.getElementById("ranking");
rank.innerHTML="";

lista.forEach((t,i)=>{

let li=document.createElement("li");

if(i==0)
li.innerText="👑 "+t.nome+" - "+t.score;
else
li.innerText=t.nome+" - "+t.score;

rank.appendChild(li);

});

});

}

function startGame(){

db.ref("rooms/"+roomCode+"/started").set(true);

document.getElementById("room").style.display="none";
document.getElementById("quiz").style.display="block";

document.getElementById("musicaFundo").volume=0.2;
document.getElementById("musicaFundo").play();

prepararPerguntas();
mostrarPergunta();

}

let todasPerguntas=[];

for(let i=1;i<=50;i++){

let a=Math.floor(Math.random()*20)+1;
let b=Math.floor(Math.random()*20)+1;

let correta=a+b;

let respostas=[correta,correta+1,correta-1,correta+2];
respostas.sort(()=>Math.random()-0.5);

todasPerguntas.push({
p:a+" + "+b+" = ?",
r:respostas,
c:respostas.indexOf(correta)
});

}

function prepararPerguntas(){

let copia=[...todasPerguntas];

for(let i=0;i<10;i++){

let idx=Math.floor(Math.random()*copia.length);
perguntas.push(copia.splice(idx,1)[0]);

}

}

function iniciarTimer(){

tempo=10;

let bar=document.getElementById("timeBar");
bar.style.width="100%";

clearInterval(timer);

timer=setInterval(()=>{

tempo--;

document.getElementById("timer").innerText="Tempo: "+tempo;
bar.style.width=(tempo*10)+"%";

if(tempo<=0){
clearInterval(timer);
proximaPergunta();
}

},1000);

}

function mostrarPergunta(){

let q=perguntas[perguntaAtual];

document.getElementById("pergunta").innerText=q.p;

for(let i=0;i<4;i++){

let btn=document.getElementById("r"+i);
btn.innerText=q.r[i];
btn.style.background="#222";

}

iniciarTimer();

}

function responder(num){

clearInterval(timer);

let q=perguntas[perguntaAtual];
let btn=document.getElementById("r"+num);

if(num==q.c){

btn.style.background="green";
document.getElementById("acerto").play();
pontos++;

}else{

btn.style.background="red";
document.getElementById("erro").play();

}

setTimeout(()=>{

proximaPergunta();

},800);

}

function proximaPergunta(){

perguntaAtual++;

if(perguntaAtual<perguntas.length){
mostrarPergunta();
}else{
mostrarRanking();
}

}

function mostrarRanking(){

db.ref("rooms/"+roomCode+"/teams/"+teamName).set({score:pontos});

db.ref("rooms/"+roomCode+"/teams").once("value",snap=>{

let lista=[];

snap.forEach(child=>{
lista.push({
nome:child.key,
score:child.val().score
});
});

lista.sort((a,b)=>b.score-a.score);

let vencedor=lista[0];

document.getElementById("quiz").style.display="none";
document.getElementById("winnerScreen").style.display="block";

document.getElementById("winnerName").innerText=
vencedor.nome+" venceu com "+vencedor.score+" pontos!";

});

}

</script></body>
</html>
